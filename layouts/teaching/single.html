{{ define "main" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <link rel="stylesheet" href="{{ "css/styles.css" | relURL }}">
    <!-- Other head elements can go here, like meta tags, etc. -->
</head>
<body>
    <article class="content-wrapper" style="margin-left: 40px;">
        <h1>{{ .Title }}</h1>
        <p>Published on: {{ .Date }}</p>
        <div>
            {{ .Content }}
        </div>
    </article>
</body>
{{ end }}
